<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MNQ Trading Dashboard</title>
<script src="https://alcdn.msauth.net/browser/2.38.0/js/msal-browser.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans+Hebrew:wght@300;400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0a0e14;--surface:#0f1520;--surface2:#161d2e;--border:#1e2d42;
  --text:#c8d4e8;--muted:#4a6080;--green:#00d084;--red:#ff4560;
  --yellow:#ffa500;--blue:#4da6ff;
  --mono:'IBM Plex Mono',monospace;--sans:'IBM Plex Sans Hebrew',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh}
#loginScreen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:20px}
.login-logo{font-family:var(--mono);font-size:26px;font-weight:600;color:var(--blue);letter-spacing:3px}
.login-logo span{color:var(--muted)}
.login-btn{background:var(--blue);color:#000;border:none;padding:14px 32px;font-family:var(--mono);font-size:14px;font-weight:600;border-radius:6px;cursor:pointer}
.login-sub{color:var(--muted);font-size:13px}
#loginError{color:var(--red);font-size:13px;display:none}

header{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;justify-content:space-between}
.logo{font-family:var(--mono);font-size:16px;font-weight:600;color:var(--blue);letter-spacing:2px}
.logo span{color:var(--muted)}
.dot{width:8px;height:8px;border-radius:50%;background:var(--green);display:inline-block;margin-left:6px;animation:pulse 2s infinite}
.dot.err{background:var(--red);animation:none}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.logout-btn{background:none;border:1px solid var(--border);color:var(--muted);font-family:var(--mono);font-size:11px;padding:4px 10px;border-radius:4px;cursor:pointer}

.stats-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border);border-bottom:1px solid var(--border)}
.stat{background:var(--surface);padding:14px 16px;text-align:center}
.stat-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.stat-value{font-family:var(--mono);font-size:20px;font-weight:600}
.c-green{color:var(--green)}.c-red{color:var(--red)}.c-blue{color:var(--blue)}.c-yellow{color:var(--yellow)}

.main{display:grid;grid-template-columns:1fr 340px;height:calc(100vh - 108px)}
.panel{border-left:1px solid var(--border);overflow-y:auto}
.panel-header{padding:10px 16px;border-bottom:1px solid var(--border);background:var(--surface);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.panel-title{font-family:var(--mono);font-size:12px;font-weight:600;color:var(--blue);letter-spacing:1px}
.badge{background:var(--border);color:var(--muted);font-family:var(--mono);font-size:11px;padding:2px 7px;border-radius:10px}

/* SIGNAL ROW */
.sig-row{border-bottom:1px solid var(--border);padding:10px 16px}
.sig-row:hover{background:var(--surface2)}
.sig-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.sig-left{display:flex;align-items:center;gap:6px}
.sig-right{display:flex;align-items:center;gap:6px}
.dir-badge{font-family:var(--mono);font-size:12px;font-weight:600;padding:2px 8px;border-radius:3px}
.dir-long{background:rgba(0,208,132,.15);color:var(--green);border:1px solid rgba(0,208,132,.3)}
.dir-short{background:rgba(255,69,96,.15);color:var(--red);border:1px solid rgba(255,69,96,.3)}
.verdict-badge{font-family:var(--mono);font-size:12px;font-weight:600;padding:2px 8px;border-radius:3px}
.v-take{background:rgba(0,208,132,.2);color:var(--green)}
.v-skip{background:rgba(255,69,96,.2);color:var(--red)}
.v-wait{background:rgba(255,165,0,.2);color:var(--yellow)}
.v-neutral{background:rgba(74,96,128,.2);color:var(--muted)}
.res-badge{font-family:var(--mono);font-size:10px;font-weight:600;padding:2px 6px;border-radius:3px}
.r-win{background:rgba(0,208,132,.2);color:var(--green)}
.r-loss{background:rgba(255,69,96,.2);color:var(--red)}
.r-pending{background:rgba(74,96,128,.2);color:var(--muted)}
.sig-time{font-family:var(--mono);font-size:11px;color:var(--blue)}
.score-txt{font-family:var(--mono);font-size:11px;color:var(--yellow)}

/* PRICE TABLE */
.price-table{width:100%;border-collapse:collapse;margin-bottom:6px}
.price-table td{padding:4px 6px;font-family:var(--mono);font-size:12px;text-align:center}
.price-table th{padding:3px 6px;font-size:10px;color:var(--muted);text-align:center;font-weight:400}
.pt-entry{color:white;font-weight:600}
.pt-sl{color:var(--red);font-weight:600}
.pt-tp{color:var(--green);font-weight:600}
.pt-dist{font-size:10px;color:var(--muted)}

/* PRICE BAR */


/* SCAN ROW */
.scan-row{border-bottom:1px solid var(--border);padding:10px 16px}
.scan-row:hover{background:var(--surface2)}
.bias-badge{font-family:var(--mono);font-size:12px;font-weight:600;padding:2px 8px;border-radius:3px}
.b-long{background:rgba(0,208,132,.15);color:var(--green)}
.b-short{background:rgba(255,69,96,.15);color:var(--red)}
.b-neutral{background:rgba(74,96,128,.2);color:var(--muted)}
.risk-txt{font-family:var(--mono);font-size:11px;font-weight:600}
.risk-high{color:var(--red)}.risk-medium{color:var(--yellow)}.risk-low{color:var(--green)}
.scan-reason{font-size:11px;color:var(--muted);margin-top:4px;line-height:1.4}

/* POPUP */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);z-index:1000;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s}
.overlay.show{opacity:1;pointer-events:all}
.popup{background:var(--surface);border:1px solid var(--border);border-radius:10px;width:340px;overflow:hidden;transform:scale(.9);transition:transform .3s}
.overlay.show .popup{transform:scale(1)}
.popup-hdr{padding:14px 18px;display:flex;align-items:center;justify-content:space-between}
.popup-hdr.take{background:rgba(0,208,132,.12);border-bottom:1px solid rgba(0,208,132,.2)}
.popup-hdr.skip{background:rgba(255,69,96,.12);border-bottom:1px solid rgba(255,69,96,.2)}
.popup-hdr.wait{background:rgba(255,165,0,.12);border-bottom:1px solid rgba(255,165,0,.2)}
.popup-verdict{font-family:var(--mono);font-size:18px;font-weight:600}
.popup-close{background:none;border:none;color:var(--muted);font-size:16px;cursor:pointer}
.popup-body{padding:14px 18px}
.pr{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border)}
.pr:last-child{border:none}
.pr-label{font-size:11px;color:var(--muted)}
.pr-val{font-family:var(--mono);font-size:12px;font-weight:600;text-align:left;max-width:200px}

.loading{display:flex;align-items:center;justify-content:center;padding:40px;color:var(--muted);font-family:var(--mono);font-size:13px;gap:10px}
.spinner{width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{padding:30px;text-align:center;color:var(--muted);font-size:13px}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
#dashboard{display:none}
</style>
</head>
<body>

<div id="loginScreen">
  <div class="login-logo">MNQ <span>//</span> DASHBOARD</div>
  <div class="login-sub">התחבר עם חשבון Microsoft שלך</div>
  <button class="login-btn" id="loginBtn">🔐 התחבר עם Microsoft</button>
  <div id="loginError"></div>
</div>

<div id="dashboard">
  <header>
    <div class="logo">MNQ <span>//</span> DASHBOARD</div>
    <div style="display:flex;align-items:center;gap:14px">
      <span style="font-family:var(--mono);font-size:11px;color:var(--muted)">
        <span class="dot" id="statusDot"></span>
        <span id="statusText">טוען...</span>
        <span id="lastUpdate" style="margin-right:6px"></span>
      </span>
      <button class="logout-btn" id="logoutBtn">יציאה</button>
    </div>
  </header>

  <div class="stats-bar">
    <div class="stat"><div class="stat-label">סה"כ</div><div class="stat-value c-blue" id="statTotal">—</div></div>
    <div class="stat"><div class="stat-label">✅ WIN</div><div class="stat-value c-green" id="statWins">—</div></div>
    <div class="stat"><div class="stat-label">❌ LOSS</div><div class="stat-value c-red" id="statLosses">—</div></div>
    <div class="stat"><div class="stat-label">Win Rate</div><div class="stat-value c-yellow" id="statRate">—</div></div>
  </div>

  <div class="main">
    <div class="panel">
      <div class="panel-header">
        <div class="panel-title">📡 סיגנלים אחרונים</div>
        <div class="badge" id="sigCount">0</div>
      </div>
      <div id="sigList"><div class="loading"><div class="spinner"></div>טוען...</div></div>
    </div>
    <div class="panel">
      <div class="panel-header">
        <div class="panel-title">🔍 סקירות אחרונות</div>
        <div class="badge" id="scanCount">0</div>
      </div>
      <div id="scanList"><div class="loading"><div class="spinner"></div>טוען...</div></div>
    </div>
  </div>
</div>

<div class="overlay" id="overlay">
  <div class="popup">
    <div class="popup-hdr" id="popupHdr">
      <div class="popup-verdict" id="popupVerdict"></div>
      <button class="popup-close" id="popupClose">✕</button>
    </div>
    <div class="popup-body" id="popupBody"></div>
  </div>
</div>

<script>
const CLIENT_ID = '75028ce6-328d-432a-a595-5bc41fe2399a';
const SITE = 'https://iteracoil.sharepoint.com/sites/Trading';
const SCOPES = ['https://iteracoil.sharepoint.com/AllSites.Read'];
const REFRESH = 30000;

const msalCfg = {
  auth: { clientId: CLIENT_ID, authority: 'https://login.microsoftonline.com/iteracoil.onmicrosoft.com', redirectUri: location.origin + location.pathname },
  cache: { cacheLocation: 'localStorage' }
};

let msalApp = null, account = null, lastSigId = null, isFirst = true;

async function getApp() {
  if (!msalApp) {
    msalApp = new msal.PublicClientApplication(msalCfg);
    await msalApp.initialize();
    const result = await msalApp.handleRedirectPromise();
    if (result && result.account) {
      account = result.account;
    }
    Object.keys(sessionStorage).filter(k => k.includes('msal')).forEach(k => sessionStorage.removeItem(k));
  }
  return msalApp;
}

async function signIn() {
  try {
    const app = await getApp();
    await app.loginRedirect({ scopes: SCOPES });
  } catch(e) {
    const el = document.getElementById('loginError');
    el.style.display = 'block';
    el.textContent = 'שגיאה: ' + e.message;
  }
}

function startDash() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
  if (Notification && Notification.permission === 'default') Notification.requestPermission();
  refresh();
  setInterval(refresh, REFRESH);
}

async function getToken() {
  const app = await getApp();
  try { return (await app.acquireTokenSilent({ scopes: SCOPES, account })).accessToken; }
  catch { return (await app.acquireTokenPopup({ scopes: SCOPES })).accessToken; }
}

async function fetchList(list, query) {
  const token = await getToken();
  const r = await fetch(SITE + "/_api/web/lists/getbytitle('" + list + "')/items?" + query, {
    headers: { Authorization: 'Bearer ' + token, Accept: 'application/json;odata=verbose' }
  });
  const data = await r.json();
  return data.d.results;
}

function fmtTime(d) {
  if (!d) return '';
  const dt = new Date(d);
  const pad = n => String(n).padStart(2,'0');
  const date = pad(dt.getDate()) + '/' + pad(dt.getMonth()+1);
  const time = pad(dt.getHours()) + ':' + pad(dt.getMinutes());
  return date + ' ' + time;
}

function dist(a, b) {
  if (!a || !b) return '—';
  return Math.abs(parseFloat(a) - parseFloat(b)).toFixed(1);
}

function buildPriceBar(entry, sl, tp1, tp2, direction) {
  var e = parseFloat(entry), s = parseFloat(sl), t1 = parseFloat(tp1), t2 = parseFloat(tp2)||0;
  if (!e || !s || !t1) return '';

  var slDist  = Math.abs(e - s).toFixed(1);
  var tp1Dist = Math.abs(t1 - e).toFixed(1);
  var tp2Dist = t2 ? Math.abs(t2 - e).toFixed(1) : null;
  var rr1 = (Math.abs(t1-e) / Math.abs(e-s)).toFixed(2);
  var rr2 = t2 ? (Math.abs(t2-e) / Math.abs(e-s)).toFixed(2) : null;

  // Calculate proportional widths based on distances
  var slPropRaw  = Math.abs(e - s);
  var tp1PropRaw = Math.abs(t1 - e);
  var tp2PropRaw = t2 ? Math.abs(t2 - e) : 0;
  var maxProp = tp2PropRaw || tp1PropRaw;
  var total = slPropRaw + maxProp;

  var slW  = (slPropRaw / total * 100).toFixed(1);
  var tpW  = (maxProp / total * 100).toFixed(1);
  var tp1LineW = (tp1PropRaw / maxProp * 100).toFixed(1);

  var html = '<div style="margin:10px 0 6px 0">';

  // === MAIN BAR ===
  html += '<div style="display:flex;align-items:stretch;height:28px;border-radius:6px;overflow:hidden;gap:2px">';

  // SL zone (red)
  html += '<div style="width:' + slW + '%;background:rgba(255,69,96,0.25);border:1px solid rgba(255,69,96,0.4);border-radius:5px;display:flex;align-items:center;justify-content:center;position:relative">';
  html += '<span style="font-family:var(--mono);font-size:11px;color:#ff4560;font-weight:600">' + s + '</span>';
  html += '</div>';

  // Entry divider
  html += '<div style="width:3px;background:white;flex-shrink:0;border-radius:2px"></div>';

  // TP zone (green) - with TP1 marker inside
  html += '<div style="width:' + tpW + '%;background:rgba(0,208,132,0.2);border:1px solid rgba(0,208,132,0.35);border-radius:5px;display:flex;align-items:center;position:relative;overflow:hidden">';
  // TP1 line inside TP zone
  if (t2) {
    html += '<div style="position:absolute;left:' + tp1LineW + '%;top:0;bottom:0;width:1px;background:rgba(0,208,132,0.6)"></div>';
    html += '<span style="font-family:var(--mono);font-size:10px;color:rgba(0,208,132,0.8);margin-right:6px;z-index:1;padding-right:4px">' + t1 + '</span>';
    html += '<span style="font-family:var(--mono);font-size:11px;color:#00d084;font-weight:600;position:absolute;right:6px">' + t2 + '</span>';
  } else {
    html += '<span style="font-family:var(--mono);font-size:11px;color:#00d084;font-weight:600;margin:0 auto">' + t1 + '</span>';
  }
  html += '</div>';
  html += '</div>';

  // === BOTTOM ROW: Entry price + distances + R:R ===
  html += '<div style="display:flex;align-items:center;justify-content:space-between;margin-top:5px">';
  // SL distance
  html += '<div style="font-family:var(--mono);font-size:10px;color:rgba(255,69,96,0.7)">−' + slDist + 'p</div>';
  // Entry center
  html += '<div style="font-family:var(--mono);font-size:12px;color:white;font-weight:600">⬥ ' + e + '</div>';
  // TP distances + R:R
  var rrTxt = t2 ? ('1:' + rr1 + ' / 1:' + rr2) : ('R:R 1:' + rr1);
  html += '<div style="font-family:var(--mono);font-size:10px;color:rgba(0,208,132,0.7)">+' + (tp2Dist||tp1Dist) + 'p &nbsp;<span style="background:rgba(0,208,132,0.15);border:1px solid rgba(0,208,132,0.3);padding:1px 6px;border-radius:3px;color:#00d084;font-size:10px">' + rrTxt + '</span></div>';
  html += '</div>';

  html += '</div>';
  return html;
}

function renderSignals(items) {
  document.getElementById('sigCount').textContent = items.length;
  var el = document.getElementById('sigList');
  if (!items.length) { el.innerHTML = '<div class="empty">אין סיגנלים עדיין</div>'; return; }

  if (!isFirst && lastSigId && items[0].ID !== lastSigId) {
    showPopup(items[0]);
    if (Notification.permission === 'granted') {
      new Notification('🎯 ' + (items[0].ClaudeVerdict||'') + ': ' + (items[0].Direction||'') + ' ' + (items[0].Ticker||''), {
        body: 'כניסה: ' + (items[0].Entry||'') + ' | SL: ' + (items[0].SL||'')
      });
    }
  }
  lastSigId = items[0].ID;

  var html = '';
  for (var i = 0; i < items.length; i++) {
    var it = items[i];
    var v = (it.ClaudeVerdict||'').toLowerCase();
    var d = (it.Direction||'').toLowerCase();
    var r = (it.Result||'PENDING').toUpperCase();
    var tp1 = it['OData__x0054_P1'] || '';
    var tp2 = it['OData__x0054_P2'] || '';
    var entry = it.Entry || '';
    var sl = it.SL || '';
    var vClass = v === 'take' ? 'v-take' : v === 'skip' ? 'v-skip' : v === 'wait' ? 'v-wait' : 'v-neutral';
    var rClass = r === 'WIN' ? 'r-win' : r === 'LOSS' ? 'r-loss' : 'r-pending';
    var dClass = d === 'long' ? 'dir-long' : 'dir-short';

    html += '<div class="sig-row" onclick="showPopupById(' + i + ')">';
    html += '<div class="sig-top">';
    html += '<div class="sig-left">';
    html += '<span class="dir-badge ' + dClass + '">' + (d === 'long' ? '▲' : '▼') + ' ' + (it.Direction||'') + '</span>';
    html += '<span class="verdict-badge ' + vClass + '">' + (it.ClaudeVerdict||'NEUTRAL') + '</span>';
    html += '</div>';
    html += '<div class="sig-right">';
    html += '<span class="res-badge ' + rClass + '">' + r + '</span>';
    html += '<span class="score-txt">⭐' + (it.ClaudeScore||'—') + '</span>';
    html += '</div>';
    html += '</div>';

    // Time row
    html += '<div style="font-family:var(--mono);font-size:11px;color:var(--blue);margin-bottom:8px">🕐 ' + fmtTime(it.SignalTime) + ' &nbsp;·&nbsp; <span style="color:var(--muted)">' + (it.SignalType||'') + '</span></div>';

    // Price table
    html += '<table class="price-table"><thead><tr>';
    html += '<th>כניסה</th><th>SL</th><th>מרחק SL</th><th>TP1</th><th>מרחק TP1</th>';
    if (tp2) html += '<th>TP2</th><th>מרחק TP2</th>';
    html += '</tr></thead><tbody><tr>';
    html += '<td class="pt-entry">' + (entry||'—') + '</td>';
    html += '<td class="pt-sl">' + (sl||'—') + '</td>';
    html += '<td class="pt-dist">' + dist(entry, sl) + '</td>';
    html += '<td class="pt-tp">' + (tp1||'—') + '</td>';
    html += '<td class="pt-dist">' + dist(entry, tp1) + '</td>';
    if (tp2) {
      html += '<td class="pt-tp" style="opacity:.7">' + tp2 + '</td>';
      html += '<td class="pt-dist">' + dist(entry, tp2) + '</td>';
    }
    html += '</tr></tbody></table>';

    // Price bar
    html += buildPriceBar(entry, sl, tp1, tp2, it.Direction);

    html += '</div>';
  }

  el.innerHTML = html;
  window._sigItems = items;
}

window.showPopupById = function(idx) {
  if (window._sigItems && window._sigItems[idx]) showPopup(window._sigItems[idx]);
};

function renderScans(items) {
  document.getElementById('scanCount').textContent = items.length;
  var el = document.getElementById('scanList');
  if (!items.length) { el.innerHTML = '<div class="empty">אין סקירות עדיין</div>'; return; }
  var html = '';
  for (var i = 0; i < items.length; i++) {
    var it = items[i];
    var b = (it.Bias||'neutral').toLowerCase();
    var bClass = b === 'long' ? 'b-long' : b === 'short' ? 'b-short' : 'b-neutral';
    var rk = (it.Risk||'').toLowerCase();
    var rkClass = rk === 'high' ? 'risk-high' : rk === 'medium' ? 'risk-medium' : 'risk-low';
    html += '<div class="scan-row">';
    html += '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">';
    html += '<div style="display:flex;align-items:center;gap:6px">';
    html += '<span class="bias-badge ' + bClass + '">' + (b === 'long' ? '▲' : b === 'short' ? '▼' : '◆') + ' ' + (it.Bias||'NEUTRAL') + '</span>';
    html += '<span style="font-family:var(--mono);font-size:11px;color:var(--muted)">' + (it.Ticker||'') + ' ' + (it.Timeframe||'') + 'm</span>';
    html += '</div>';
    html += '<span class="risk-txt ' + rkClass + '">⚠ ' + (it.Risk||'') + '</span>';
    html += '</div>';
    html += '<div style="font-family:var(--mono);font-size:11px;color:var(--blue);margin-bottom:4px">🕐 ' + fmtTime(it.ScanTime) + '</div>';
    html += '<div class="scan-reason">' + (it.BiasReason||'') + '</div>';
    html += '</div>';
  }
  el.innerHTML = html;
}

function updateStats(items) {
  var w = 0, l = 0;
  for (var i = 0; i < items.length; i++) {
    var r = (items[i].Result||'').toUpperCase();
    if (r === 'WIN') w++;
    else if (r === 'LOSS') l++;
  }
  document.getElementById('statTotal').textContent = items.length;
  document.getElementById('statWins').textContent = w;
  document.getElementById('statLosses').textContent = l;
  document.getElementById('statRate').textContent = (w+l) > 0 ? Math.round(w/(w+l)*100) + '%' : 'N/A';
}

function showPopup(item) {
  var v = (item.ClaudeVerdict||'').toLowerCase();
  var d = (item.Direction||'').toLowerCase();
  var tp1 = item['OData__x0054_P1'] || '—';
  var tp2 = item['OData__x0054_P2'] || '—';
  document.getElementById('popupHdr').className = 'popup-hdr ' + (v || 'neutral');
  document.getElementById('popupVerdict').textContent = (v === 'take' ? '🎯' : v === 'skip' ? '⛔' : '⏳') + ' ' + (item.ClaudeVerdict||'');
  document.getElementById('popupVerdict').style.color = v === 'take' ? 'var(--green)' : v === 'skip' ? 'var(--red)' : 'var(--yellow)';
  var body = '';
  body += '<div class="pr"><div class="pr-label">זמן</div><div class="pr-val" style="font-family:var(--sans)">' + fmtTime(item.SignalTime) + '</div></div>';
  body += '<div class="pr"><div class="pr-label">כיוון</div><div class="pr-val" style="color:' + (d==='long'?'var(--green)':'var(--red)') + '">' + (d==='long'?'▲':'▼') + ' ' + (item.Direction||'') + '</div></div>';
  body += '<div class="pr"><div class="pr-label">כניסה</div><div class="pr-val">' + (item.Entry||'—') + '</div></div>';
  body += '<div class="pr"><div class="pr-label">SL</div><div class="pr-val" style="color:var(--red)">' + (item.SL||'—') + ' <span style="color:var(--muted);font-size:10px">(' + dist(item.Entry, item.SL) + ' נק\')</span></div></div>';
  body += '<div class="pr"><div class="pr-label">TP1</div><div class="pr-val" style="color:var(--green)">' + tp1 + ' <span style="color:var(--muted);font-size:10px">(' + dist(item.Entry, tp1) + ' נק\')</span></div></div>';
  body += '<div class="pr"><div class="pr-label">TP2</div><div class="pr-val" style="color:var(--green);opacity:.8">' + tp2 + '</div></div>';
  body += '<div class="pr"><div class="pr-label">ציון</div><div class="pr-val" style="color:var(--yellow)">' + (item.ClaudeScore||'—') + '/10</div></div>';
  body += '<div class="pr"><div class="pr-label">החלטה</div><div class="pr-val" style="font-family:var(--sans);font-size:11px;font-weight:400;color:var(--text)">' + (item.VerdictNote||'—') + '</div></div>';
  document.getElementById('popupBody').innerHTML = body;
  document.getElementById('overlay').classList.add('show');
}

async function refresh() {
  var dot = document.getElementById('statusDot');
  dot.className = 'dot';
  try {
    var signals = await fetchList('TradingPredictions', '$orderby=SignalTime%20desc&$top=20');
    var scans = await fetchList('TradingScans', '$orderby=ScanTime%20desc&$top=10');
    renderSignals(signals);
    renderScans(scans);
    updateStats(signals);
    dot.className = 'dot';
    document.getElementById('statusText').textContent = 'מחובר';
    var now = new Date();
    document.getElementById('lastUpdate').textContent = String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0') + ':' + String(now.getSeconds()).padStart(2,'0');
    isFirst = false;
  } catch(e) {
    dot.className = 'dot err';
    document.getElementById('statusText').textContent = 'שגיאה';
    console.error(e);
  }
}

document.getElementById('loginBtn').onclick = signIn;
document.getElementById('logoutBtn').onclick = function() {
  if (msalApp) msalApp.logoutPopup({ account: account });
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
};
document.getElementById('popupClose').onclick = function() { document.getElementById('overlay').classList.remove('show'); };
document.getElementById('overlay').onclick = function(e) { if (e.target.id === 'overlay') document.getElementById('overlay').classList.remove('show'); };

(async function init() {
  var app = await getApp();
  if (account) { startDash(); return; }
  var accounts = app.getAllAccounts();
  if (accounts.length > 0) { account = accounts[0]; startDash(); }
})();
</script>
